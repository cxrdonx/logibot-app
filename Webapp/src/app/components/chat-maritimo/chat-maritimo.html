<app-header (onReset)="resetConversation()" (onLogout)="handleLogout()"></app-header>

<div class="chat-wrapper">
  <!-- Chat header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/>
          <path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.67.97 5.12 2.62 7"/>
          <path d="M12 10V2"/>
          <path d="m6.3 12.7 5.7-2.7 5.7 2.7"/>
        </svg>
      </div>
      <div>
        <h2 class="chat-title">ALCE - Experto en Logística Marítima</h2>
        <p class="chat-subtitle">AI Logistics &amp; Customs Expert V2</p>
      </div>
    </div>
    <div class="status-badge">
      <span class="status-dot"></span>
      En línea
    </div>
  </div>

  <!-- Messages area -->
  <div class="messages-area">
    <div class="messages-date">
      <span>Hoy {{ today | date:'shortTime' }}</span>
    </div>

    <div *ngFor="let msg of messages" class="message-row"
      [ngClass]="msg.sender === 'user' ? 'message-row--user' : 'message-row--bot'">

      <div class="message-bubble"
        [ngClass]="{
          'bubble--user': msg.sender === 'user' && !msg.isError,
          'bubble--bot': msg.sender === 'bot' && !msg.isError,
          'bubble--error': msg.isError
        }">
        <p class="message-text">{{ msg.text }}</p>
      </div>

      <span class="message-meta"
        [ngClass]="msg.sender === 'user' ? 'message-meta--right' : 'message-meta--left'">
        {{ msg.sender === 'bot' ? 'ALCE' : 'Tú' }} &bull; {{ msg.timestamp | date:'shortTime' }}
      </span>
    </div>

    <!-- Typing indicator -->
    <div *ngIf="isTyping" class="message-row message-row--bot typing-row">
      <div class="bubble--bot typing-bubble">
        <span class="dot"></span>
        <span class="dot dot--delay1"></span>
        <span class="dot dot--delay2"></span>
      </div>
    </div>

    <div #scrollEnd></div>
  </div>

  <!-- Quick prompt chips -->
  <div *ngIf="!isTyping" class="quick-prompts-row">
    <button
      *ngFor="let p of quickPrompts"
      class="quick-prompt-chip"
      (click)="setQuickPrompt(p.text)"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/>
        <path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.67.97 5.12 2.62 7"/>
        <path d="M12 10V2"/>
        <path d="m6.3 12.7 5.7-2.7 5.7 2.7"/>
      </svg>
      {{ p.label }}
    </button>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <input
      type="text"
      class="chat-input"
      [(ngModel)]="inputText"
      (keydown.enter)="sendMessage()"
      [disabled]="isTyping"
      placeholder="Ej: ¿Cuánto cuesta un 40HC de Rotterdam a Puerto Barrios?"
    />
    <button
      class="send-btn"
      (click)="sendMessage()"
      [disabled]="!inputText.trim() || isTyping">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="22" x2="11" y1="2" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="input-footer">Conectado a AWS API Gateway &bull; ALCE V2</p>
</div>
